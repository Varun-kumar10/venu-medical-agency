<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h2>📦 Track Order</h2>
    <a href="index.html">Home</a>
</nav>

<div class="track-box">
    <!-- ✅ FORM with correct ID -->
    <form id="trackForm">
        <input
            type="number"
            id="orderId"
            placeholder="Enter Order ID"
            required
        >
        <button type="submit">Track</button>
    </form>

    <!-- Result -->
    <div id="result"></div>

    <!-- Timeline -->
    <div id="timelineContainer"></div>
</div>

<script src="js/track-order.js"></script>
</body>
</html>
